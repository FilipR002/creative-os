version: '3.9'

# Run ONLY the database — use this during local development
# Start: docker compose -f docker-compose.db-only.yml up -d
# Then:  npm run start

services:
  postgres:
    image: postgres:16-alpine
    container_name: creative_os_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creative_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
